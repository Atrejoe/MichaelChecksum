version: '3'
services:
  web:
    build: .
    image: atreyu/michaelchecksum:latest
    ports:
      - 5000:5000
      - 5001:5001
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:5000/
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M